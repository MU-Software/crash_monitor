name: Dependency audit

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:
  pull_request:
    paths:
      - Cargo.toml
      - Cargo.lock
      - crates/**/Cargo.toml
      - crates/**/Cargo.lock

jobs:
  rustsec:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
