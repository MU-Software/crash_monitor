# Cargo configuration for the crash monitor crate.
#
# CRITICAL: This file redirects the crash monitor's data directory to a
# tempdir under `target/` whenever cargo invokes the binary or test runners.
#
# Without this, any test that constructs a `Pipeline` with `output_dir: None`
# (or any code path that falls back to `paths::pending_dir()`) would write
# real crash report files into the user's `~/.modelblockbuilder/crashes/pending/`,
# polluting their actual crash inventory.
#
# The production binary (codesigned and launched by `make desktop-monitor-run`)
# is NOT invoked through cargo, so it does NOT inherit this env var and
# continues to use `~/.modelblockbuilder/` as designed.
#
# `relative = true` (Cargo 1.43+) resolves the path relative to the directory
# containing this config file (i.e. `tools/crash_monitor/`), so the sandbox
# becomes `tools/crash_monitor/target/test-crash-data/` — gitignored and
# automatically removed by `cargo clean`.

[env]
MBB_CRASH_DATA_DIR = { value = "target/test-crash-data", relative = true }
